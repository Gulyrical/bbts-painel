<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBTS — Cadastro de Colaboradores</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#465EFF;--green:#2E7D5E;--red:#C0392B;--bg:#F5F6F8;--white:#fff;--border:#E5E7EB;--text:#111827;--text2:#6B7280;--radius:8px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.header{background:var(--blue);color:#fff;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand-mark{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}
.brand-name{font-size:14px;font-weight:600;letter-spacing:0.03em}
.brand-sub{font-size:11px;opacity:0.65;margin-top:1px}
.btn-atualizar{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn-atualizar:hover{background:rgba(255,255,255,0.25)}
.btn-atualizar.spin span{display:inline-block;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.main{max-width:1200px;margin:0 auto;padding:24px 28px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.kpi-l{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.kpi-v{font-size:28px;font-weight:500;line-height:1}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Inter',sans-serif;background:var(--white)}
.toolbar input{flex:1;min-width:200px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--blue)}
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);background:#FAFAFA;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F0F4FF}
tbody td{padding:11px 14px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-a{background:#ECFDF5;color:#065F46;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.badge-d{background:#FEF2F2;color:#991B1B;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;flex-shrink:0}
.pag{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.pag button{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.pag button:disabled{opacity:0.4;cursor:default}
.empty{padding:40px;text-align:center;color:var(--text2);font-size:13px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:48px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:12px;width:min(780px,95vw);padding:24px;margin-bottom:48px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-av{width:48px;height:48px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#fff}
.modal-nome{font-size:16px;font-weight:500}
.modal-sub{font-size:12px;color:var(--text2);margin-top:3px}
.btn-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;line-height:1;padding:4px}
.btn-close:hover{color:var(--text)}
.secao{font-size:11px;font-weight:500;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;padding:6px 0 4px;border-bottom:1.5px solid var(--blue);margin:16px 0 10px}
.secao:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.campo{background:#F9FAFB;border-radius:6px;padding:8px 12px;border:1px solid var(--border)}
.campo-l{font-size:10px;color:var(--blue);font-weight:500;letter-spacing:0.05em;margin-bottom:3px;text-transform:uppercase}
.campo-v{font-size:13px;color:var(--text);font-weight:500}
.campo-e{color:var(--text2);font-style:italic;font-size:12px;font-weight:400}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="brand-mark">RH</div>
    <div>
      <div class="brand-name">BBTS — Gestão de Pessoas</div>
      <div class="brand-sub" id="sub">Carregando...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:11px;color:rgba(255,255,255,0.55)" id="upd">—</span>
    <button class="btn-atualizar" id="btn" onclick="loadData()">
      <span id="ri">↻</span> Atualizar
    </button>
  </div>
</header>

<main class="main">
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-l">Total</div><div class="kpi-v" id="k-total" style="color:var(--text)">—</div></div>
    <div class="kpi"><div class="kpi-l">Ativos</div><div class="kpi-v" id="k-ativos" style="color:var(--blue)">—</div></div>
    <div class="kpi"><div class="kpi-l">Desligados</div><div class="kpi-v" id="k-deslig" style="color:var(--red)">—</div></div>
    <div class="kpi"><div class="kpi-l">Com e-mail</div><div class="kpi-v" id="k-email" style="color:var(--green)">—</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="sq" placeholder="Buscar por nome ou matrícula..." oninput="applyFilter()" />
    <select id="ss" onchange="applyFilter()">
      <option value="">Todos os status</option>
      <option value="Ativo">Ativos</option>
      <option value="Desligado">Desligados</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:38%">Nome</th>
          <th style="width:12%">Matrícula</th>
          <th style="width:14%">Admissão</th>
          <th style="width:22%">Cargo</th>
          <th style="width:14%;text-align:center">Status</th>
        </tr>
      </thead>
      <tbody id="tb">
        <tr><td colspan="5" class="empty">Carregando dados...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pag">
    <span id="pi">—</span>
    <div style="display:flex;gap:6px">
      <button onclick="changePage(-1)" id="pp">← Anterior</button>
      <button onclick="changePage(1)"  id="pn">Próxima →</button>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="modal-av" id="m-av">—</div>
        <div>
          <div class="modal-nome" id="m-nome">—</div>
          <div class="modal-sub" id="m-sub">—</div>
        </div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div id="mb"></div>
  </div>
</div>

<script>
const API = '/api/notion';
let rows = [], filt = [], page = 1;
const PER = 20;

function fmt(x) {
  if (!x || x === 'None' || x === 'nan' || x === 'null' || x === 'undefined') return null;
  return String(x).trim();
}

function fmtDate(d) {
  if (!d) return null;
  try {
    var parts = d.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  } catch(e) { return d; }
}

function campo(label, val) {
  var v = fmt(val);
  return '<div class="campo"><div class="campo-l">' + label + '</div><div class="campo-v">' +
    (v ? v : '<span class="campo-e">Em branco</span>') + '</div></div>';
}

async function loadData() {
  var btn = document.getElementById('btn');
  btn.classList.add('spin');

  try {
    var [rv, rp, rc] = await Promise.all([
      fetch(API + '?db=vinculos').then(r => r.json()),
      fetch(API + '?db=pessoas').then(r => r.json()),
      fetch(API + '?db=cargos').then(r => r.json()),
    ]);

    if (rv.error) throw new Error(rv.error);

    // Mapas
    var pMap = {};
    (rp.pessoas || []).forEach(p => { pMap[p.id] = p; });

    var cMap = {};
    (rc.cargos || []).forEach(c => { cMap[c.id] = c; });

    // Cruzar vínculos + pessoas + cargos
    rows = (rv.vinculos || []).map(v => {
      var p = pMap[v.pessoa_id] || {};
      var c = cMap[v.cargo_id]  || {};
      return {
        nome:          fmt(p.nome) || '—',
        matricula:     fmt(v.matricula),
        status:        fmt(v.status),
        data_admissao: v.data_admissao,
        data_deslig:   v.data_deslig,
        ocorrencia:    fmt(v.ocorrencia),
        gestor:        fmt(v.gestor),
        ultimo_dia:    v.ultimo_dia,
        tipo_contrato: fmt(p.tipo_contrato),
        jornada:       fmt(p.jornada),
        uor:           fmt(v.uor),
        cod_cargo:     fmt(c.codigo),
        cargo:         fmt(c.cargo),
        salario:       c.salario ? 'R$ ' + c.salario.toLocaleString('pt-BR', {minimumFractionDigits:2}) : null,
        nivel:         fmt(c.nivel),
        cpf:           fmt(p.cpf),
        rg:            fmt(p.rg),
        orgao_rg:      fmt(p.orgao_rg),
        nascimento:    p.nascimento,
        sexo:          fmt(p.sexo),
        estado_civil:  fmt(p.estado_civil),
        nacionalidade: fmt(p.nacionalidade),
        telefone:      fmt(p.telefone),
        logradouro:    fmt(p.logradouro),
        numero:        fmt(p.numero),
        complemento:   fmt(p.complemento),
        bairro:        fmt(p.bairro),
        cidade:        fmt(p.cidade),
        estado:        fmt(p.estado),
        cep:           fmt(p.cep),
        email_pessoal: fmt(p.email_pessoal),
        email_corp:    fmt(p.email_corp),
        banco:         fmt(p.banco),
        agencia:       fmt(p.agencia),
        conta:         fmt(p.conta),
        tipo_conta:    fmt(p.tipo_conta),
        mae:           fmt(p.nome_mae),
        pai:           fmt(p.nome_pai),
        grau_instrucao: fmt(p.grau_instrucao),
        pis:           fmt(p.pis),
        ctps:          fmt(p.ctps),
      };
    });

    var ativos = rows.filter(r => r.status === 'Ativo').length;
    var deslig = rows.filter(r => r.status === 'Desligado').length;
    var emails = rows.filter(r => r.email_pessoal).length;
    document.getElementById('k-total').textContent  = rows.length;
    document.getElementById('k-ativos').textContent = ativos;
    document.getElementById('k-deslig').textContent = deslig;
    document.getElementById('k-email').textContent  = emails;
    document.getElementById('sub').textContent = rows.length + ' colaboradores';
    document.getElementById('upd').textContent = 'Atualizado às ' +
      new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    applyFilter();

  } catch(e) {
    document.getElementById('sub').textContent = 'Erro: ' + e.message;
    document.getElementById('tb').innerHTML = '<tr><td colspan="5" class="empty">⚠ ' + e.message + '</td></tr>';
  }

  btn.classList.remove('spin');
}

function applyFilter() {
  var q = document.getElementById('sq').value.toLowerCase();
  var s = document.getElementById('ss').value;
  filt = rows.filter(r =>
    (!q || (r.nome||'').toLowerCase().includes(q) || (r.matricula||'').includes(q)) &&
    (!s || r.status === s)
  );
  page = 1;
  render();
}

function changePage(d) {
  page = Math.max(1, Math.min(Math.ceil(filt.length/PER), page+d));
  render();
}

function render() {
  var tb = document.getElementById('tb');
  var start = (page-1)*PER;
  var slice = filt.slice(start, start+PER);
  var total = filt.length;

  document.getElementById('pi').textContent =
    total > 0 ? (start+1) + '–' + Math.min(start+PER,total) + ' de ' + total + ' colaboradores' : '0 resultados';
  document.getElementById('pp').disabled = page <= 1;
  document.getElementById('pn').disabled = page >= Math.ceil(total/PER);

  if (!slice.length) {
    tb.innerHTML = '<tr><td colspan="5" class="empty">Nenhum resultado encontrado</td></tr>';
    return;
  }

  tb.innerHTML = slice.map((r,i) => {
    var ini = (r.nome||'?').split(' ').slice(0,2).map(n=>n[0]).join('');
    return '<tr onclick="openModal(' + (start+i) + ')">' +
      '<td><div style="display:flex;align-items:center;gap:9px">' +
        '<div class="avatar">' + ini + '</div>' +
        '<span>' + (r.nome||'—') + '</span>' +
      '</div></td>' +
      '<td style="color:var(--text2)">' + (r.matricula||'—') + '</td>' +
      '<td style="color:var(--text2)">' + (fmtDate(r.data_admissao)||'—') + '</td>' +
      '<td style="color:var(--text2)">' + (r.cargo||'—') + '</td>' +
      '<td style="text-align:center"><span class="' + (r.status==='Ativo'?'badge-a':'badge-d') + '">' + (r.status||'—') + '</span></td>' +
    '</tr>';
  }).join('');
}

function openModal(idx) {
  var r = filt[idx];
  if (!r) return;
  var ini = (r.nome||'?').split(' ').slice(0,2).map(n=>n[0]).join('');
  document.getElementById('m-av').textContent = ini;
  document.getElementById('m-nome').textContent = r.nome || '—';
  document.getElementById('m-sub').textContent =
    'Matrícula: ' + (r.matricula||'—') + ' · ' + (r.status||'—') +
    (r.uor ? ' · UOR: ' + r.uor : '');

  document.getElementById('mb').innerHTML =
    '<div class="secao">Vínculo</div>' +
    '<div class="g4">' +
      campo('Matrícula', r.matricula) +
      campo('Status', r.status) +
      campo('Admissão', fmtDate(r.data_admissao)) +
      campo('Desligamento', fmtDate(r.data_deslig)) +
    '</div>' +
    '<div class="g3" style="margin-top:8px">' +
      campo('Tipo de Contrato', r.tipo_contrato) +
      campo('Jornada', r.jornada) +
      campo('Ocorrência', r.ocorrencia) +
    '</div>' +
    (r.gestor ? '<div class="g2" style="margin-top:8px">' +
      campo('Gestor', r.gestor) +
      campo('Último dia', fmtDate(r.ultimo_dia)) +
    '</div>' : '') +

    '<div class="secao">Cargo</div>' +
    '<div class="g3">' +
      campo('Código do Cargo', r.cod_cargo) +
      campo('Cargo', r.cargo) +
      campo('Nível', r.nivel) +
    '</div>' +
    '<div class="g2" style="margin-top:8px">' +
      campo('Salário', r.salario) +
      campo('UOR', r.uor) +
    '</div>' +

    '<div class="secao">Dados Pessoais</div>' +
    '<div class="g4">' +
      campo('CPF', r.cpf) +
      campo('RG', r.rg) +
      campo('Órgão Emissor', r.orgao_rg) +
      campo('Data de Nascimento', fmtDate(r.nascimento)) +
    '</div>' +
    '<div class="g4" style="margin-top:8px">' +
      campo('Sexo', r.sexo) +
      campo('Estado Civil', r.estado_civil) +
      campo('Nacionalidade', r.nacionalidade) +
      campo('Telefone', r.telefone) +
    '</div>' +

    '<div class="secao">Endereço</div>' +
    '<div class="g4">' +
      campo('Logradouro', r.logradouro) +
      campo('Número', r.numero) +
      campo('Complemento', r.complemento) +
      campo('CEP', r.cep) +
    '</div>' +
    '<div class="g3" style="margin-top:8px">' +
      campo('Bairro', r.bairro) +
      campo('Cidade', r.cidade) +
      campo('Estado', r.estado) +
    '</div>' +

    '<div class="secao">Contato</div>' +
    '<div class="g2">' +
      campo('E-mail Pessoal', r.email_pessoal) +
      campo('E-mail Corporativo', r.email_corp) +
    '</div>' +

    '<div class="secao">Dados Bancários</div>' +
    '<div class="g4">' +
      campo('Banco', r.banco) +
      campo('Agência', r.agencia) +
      campo('Conta', r.conta) +
      campo('Tipo de Conta', r.tipo_conta) +
    '</div>' +

    '<div class="secao">Formação</div>' +
    '<div class="g2">' +
      campo('Grau de Instrução', r.grau_instrucao) +
      campo('PIS', r.pis) +
    '</div>' +

    '<div class="secao">Filiação</div>' +
    '<div class="g2">' +
      campo('Nome da Mãe', r.mae) +
      campo('Nome do Pai', r.pai) +
    '</div>';

  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

loadData();
</script>
</body>
</html>
