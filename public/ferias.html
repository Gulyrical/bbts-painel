<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBTS — Férias</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#465EFF;--green:#2E7D5E;--green-lt:#E6F4EF;--amber:#E8A020;--amber-lt:#FEF3DC;--bg:#F5F6F8;--white:#fff;--border:#E5E7EB;--text:#111827;--text2:#6B7280;--radius:8px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.header{background:var(--blue);color:#fff;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand-mark{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}
.brand-name{font-size:14px;font-weight:600;letter-spacing:0.03em}
.brand-sub{font-size:11px;opacity:0.65;margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.btn-acao{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn-acao:hover{background:rgba(255,255,255,0.25)}
.btn-acao.spin span{display:inline-block;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.upd{font-size:11px;color:rgba(255,255,255,0.55)}

.main{max-width:1300px;margin:0 auto;padding:24px 28px}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.kpi-l{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.kpi-v{font-size:28px;font-weight:500;line-height:1;color:var(--text)}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Inter',sans-serif;background:var(--white)}
.toolbar input{flex:1;min-width:200px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--blue)}

/* Grid */
.grid{display:grid;grid-template-columns:260px 1fr;gap:16px}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.card:last-child{margin-bottom:0}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;background:#FAFAFA}

/* Gráfico barras */
.bar-list{padding:12px 16px}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-item:last-child{margin-bottom:0}
.bar-mes{font-size:11px;color:var(--text2);width:64px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#EEF0FF;border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;background:var(--blue);border-radius:4px;display:flex;align-items:center;padding-left:6px;transition:width 0.4s}
.bar-num{font-size:10px;font-weight:500;color:#fff;white-space:nowrap}

/* Resumo */
.resumo-wrap{max-height:220px;overflow-y:auto}
.resumo-table{width:100%;border-collapse:collapse}
.resumo-table th{padding:8px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);background:#FAFAFA}
.resumo-table td{padding:8px 14px;font-size:13px;border-bottom:1px solid var(--border)}
.resumo-table tr:last-child td{border-bottom:none;font-weight:600;color:var(--blue)}
.resumo-table tr:hover td{background:#F0F4FF}

/* Tabela lista */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);background:#FAFAFA;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--blue);background:#F0F4FF}
thead th.sort-active{color:var(--blue)}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F0F4FF}
tbody td{padding:10px 14px;font-size:13px}

.pag{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.pag button{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.pag button:disabled{opacity:0.4;cursor:default}
.empty{padding:40px;text-align:center;color:var(--text2);font-size:13px}
.loading-row td{text-align:center;padding:40px;color:var(--text2)}
.spinner{width:24px;height:24px;border:2px solid #EEF0FF;border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px}

.badge-abono{background:#EEF2FF;color:#3730A3;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
</style>
</head>
<body>
<header class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="brand-mark">🏖</div>
    <div>
      <div class="brand-name">BBTS — Férias</div>
      <div class="brand-sub" id="sub">Carregando...</div>
    </div>
  </div>
  <div class="header-right">
    <span class="upd" id="upd">—</span>
    <button class="btn-acao" id="btn" onclick="loadData()">
      <span id="ri">↻</span> Atualizar
    </button>
    <a href="/" class="btn-acao">← Portal</a>
  </div>
</header>

<main class="main">
  <!-- KPIs -->
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-l">Total de Registros</div><div class="kpi-v" id="k-total">—</div></div>
    <div class="kpi"><div class="kpi-l">Total de Dias</div><div class="kpi-v" id="k-dias">—</div></div>
    <div class="kpi"><div class="kpi-l">Dias de Abono</div><div class="kpi-v" id="k-abono">—</div></div>
    <div class="kpi"><div class="kpi-l">Colaboradores</div><div class="kpi-v" id="k-colab">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="sq" placeholder="Buscar por colaborador..." oninput="applyFilter()">
    <select id="f-mes" onchange="applyFilter()">
      <option value="">Todos os meses</option>
    </select>
    <select id="f-ano" onchange="applyFilter()">
      <option value="">Todos os anos</option>
    </select>
    <button class="btn-acao" style="color:var(--blue);background:var(--white);border-color:var(--border)" onclick="limpar()">✕ Limpar</button>
  </div>

  <div class="grid">
    <!-- Esquerda: gráfico + resumo -->
    <div>
      <div class="card">
        <div class="card-head">Visão Geral — por mês</div>
        <div class="bar-list" id="grafico">
          <div class="empty">Carregando...</div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">Total de dias por mês</div>
        <div class="resumo-wrap">
          <table class="resumo-table">
            <thead><tr><th>Mês/Ano</th><th style="text-align:right">Dias</th></tr></thead>
            <tbody id="b-resumo"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Direita: lista -->
    <div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('nome')">Colaborador <span id="s-nome"></span></th>
              <th onclick="sortBy('inicio')" style="width:110px">Início <span id="s-inicio"></span></th>
              <th onclick="sortBy('fim')" style="width:110px">Fim <span id="s-fim"></span></th>
              <th onclick="sortBy('dias')" style="width:70px;text-align:center">Dias <span id="s-dias"></span></th>
              <th style="width:90px;text-align:center">Abono</th>
            </tr>
          </thead>
          <tbody id="b-lista">
            <tr class="loading-row"><td colspan="5"><div class="spinner"></div>Carregando...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pag">
        <span id="pi">—</span>
        <div style="display:flex;gap:6px">
          <button onclick="changePage(-1)" id="pp">← Anterior</button>
          <button onclick="changePage(1)" id="pn">Próxima →</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const API = '/api/notion';
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MESES_C = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const PER = 15;
let todos=[], filt=[], page=1, sortCol='inicio', sortDir=1;

function fmtD(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function mesKey(d){if(!d)return'';var p=d.split('-');return p[0]+'-'+p[1];}
function mesLabel(k){var p=k.split('-');return MESES[parseInt(p[1])-1]+'/'+p[0];}
function mesCurto(k){var p=k.split('-');return MESES_C[parseInt(p[1])-1]+'/'+p[0].slice(2);}

async function loadData(){
  var btn=document.getElementById('btn');
  btn.classList.add('spin');
  try{
    var res=await fetch(API+'?db=afastamentos_ferias');
    var data=await res.json();
    if(data.error)throw new Error(data.error);
    todos=(data.ferias||[]).map(function(r){
      return{nome:r.nome||'—',inicio:r.data_inicio||null,fim:r.data_fim||null,dias:r.qtd_dias||0,abono:r.dias_abono||0};
    });
    document.getElementById('sub').textContent=todos.length+' registros de férias';
    document.getElementById('upd').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    preencherFiltros();
    applyFilter();
  }catch(e){
    document.getElementById('b-lista').innerHTML='<tr><td colspan="5" style="padding:20px;color:red;text-align:center">Erro: '+e.message+'</td></tr>';
    document.getElementById('sub').textContent='Erro ao carregar';
  }
  btn.classList.remove('spin');
}

function preencherFiltros(){
  var meses=[...new Set(todos.filter(r=>r.inicio).map(r=>mesKey(r.inicio)))].sort();
  var anos=[...new Set(todos.filter(r=>r.inicio).map(r=>r.inicio.split('-')[0]))].sort();
  var sm=document.getElementById('f-mes');
  sm.innerHTML='<option value="">Todos os meses</option>';
  meses.forEach(function(k){sm.innerHTML+=`<option value="${k}">${mesLabel(k)}</option>`;});
  var sa=document.getElementById('f-ano');
  sa.innerHTML='<option value="">Todos os anos</option>';
  anos.forEach(function(a){sa.innerHTML+=`<option value="${a}">${a}</option>`;});
}

function applyFilter(){
  var q=document.getElementById('sq').value.toLowerCase();
  var fm=document.getElementById('f-mes').value;
  var fa=document.getElementById('f-ano').value;
  filt=todos.filter(function(r){
    if(q&&!r.nome.toLowerCase().includes(q))return false;
    if(fm&&mesKey(r.inicio)!==fm)return false;
    if(fa&&r.inicio&&r.inicio.split('-')[0]!==fa)return false;
    return true;
  });
  page=1;render();
}

function limpar(){
  document.getElementById('sq').value='';
  document.getElementById('f-mes').value='';
  document.getElementById('f-ano').value='';
  applyFilter();
}

function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
  ['nome','inicio','fim','dias'].forEach(function(c){
    var el=document.getElementById('s-'+c);
    if(el)el.textContent=c===sortCol?(sortDir===1?' ↑':' ↓'):'';
  });
  render();
}

function changePage(d){page=Math.max(1,Math.min(Math.ceil(filt.length/PER),page+d));render();}

function render(){
  // KPIs
  var tDias=filt.reduce(function(s,r){return s+(r.dias||0);},0);
  var tAbono=filt.reduce(function(s,r){return s+(r.abono||0);},0);
  var colab=new Set(filt.map(r=>r.nome)).size;
  document.getElementById('k-total').textContent=filt.length;
  document.getElementById('k-dias').textContent=tDias;
  document.getElementById('k-abono').textContent=tAbono;
  document.getElementById('k-colab').textContent=colab;

  // Agrupar por mês
  var porMes={};
  filt.forEach(function(r){
    if(!r.inicio)return;
    var k=mesKey(r.inicio);
    if(!porMes[k])porMes[k]={count:0,dias:0};
    porMes[k].count++;
    porMes[k].dias+=r.dias||0;
  });
  var mesesOrd=Object.keys(porMes).sort();
  var maxC=Math.max(...mesesOrd.map(k=>porMes[k].count),1);

  // Gráfico
  var gHtml='';
  mesesOrd.forEach(function(k){
    var pct=(porMes[k].count/maxC*100).toFixed(1);
    gHtml+=`<div class="bar-item">
      <div class="bar-mes">${mesCurto(k)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"><span class="bar-num">${porMes[k].count}</span></div></div>
    </div>`;
  });
  document.getElementById('grafico').innerHTML=gHtml||'<div class="empty">Sem dados</div>';

  // Resumo
  var rHtml='';var tD=0;
  mesesOrd.forEach(function(k){tD+=porMes[k].dias;rHtml+=`<tr><td>${mesLabel(k)}</td><td style="text-align:right">${porMes[k].dias}</td></tr>`;});
  rHtml+=`<tr><td>Total</td><td style="text-align:right">${tD}</td></tr>`;
  document.getElementById('b-resumo').innerHTML=rHtml;

  // Lista
  var lista=[...filt].sort(function(a,b){
    var va=a[sortCol]||'';var vb=b[sortCol]||'';
    if(sortCol==='dias'){va=a.dias||0;vb=b.dias||0;}
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
  var start=(page-1)*PER;
  var slice=lista.slice(start,start+PER);
  var total=lista.length;
  document.getElementById('pi').textContent=total>0?(start+1)+'–'+Math.min(start+PER,total)+' de '+total+' registros':'0 resultados';
  document.getElementById('pp').disabled=page<=1;
  document.getElementById('pn').disabled=page>=Math.ceil(total/PER);

  var lHtml='';
  slice.forEach(function(r){
    lHtml+=`<tr>
      <td>${r.nome}</td>
      <td>${fmtD(r.inicio)}</td>
      <td>${fmtD(r.fim)}</td>
      <td style="text-align:center">${r.dias||'—'}</td>
      <td style="text-align:center">${r.abono>0?`<span class="badge-abono">${r.abono}</span>`:'—'}</td>
    </tr>`;
  });
  document.getElementById('b-lista').innerHTML=lHtml||'<tr><td colspan="5" class="empty">Nenhum registro encontrado</td></tr>';
}

loadData();
</script>
</body>
</html>
