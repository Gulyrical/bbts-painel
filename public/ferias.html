<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBTS — Levantamento Férias</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F5A800;--gold-dk:#D4920A;--gold-lt:#FFF3CC;--gold-bg:#FEF9E7;
  --blue:#1A3B8C;--blue-lt:#EEF2FF;
  --white:#fff;--border:#E8D88A;--text:#1A1A1A;--text2:#555;--radius:8px;
  --bg:#FDF6D8;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{
  background:linear-gradient(135deg,#F5A800 0%,#E8920A 50%,#D4820A 100%);
  padding:20px 32px;text-align:center;position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.header-logo{width:60px;height:60px;margin:0 auto 8px;display:block}
.header h1{color:var(--blue);font-size:26px;font-weight:700;letter-spacing:0.05em}
.btn-portal{position:absolute;top:50%;left:24px;transform:translateY(-50%);
  background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.5);
  color:var(--blue);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;
  text-decoration:none;font-family:'Inter',sans-serif;cursor:pointer}
.btn-portal:hover{background:rgba(255,255,255,0.4)}
.btn-atualizar{position:absolute;top:50%;right:24px;transform:translateY(-50%);
  background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.5);
  color:var(--blue);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif}
.btn-atualizar:hover{background:rgba(255,255,255,0.4)}
.upd{position:absolute;bottom:8px;right:24px;font-size:10px;color:rgba(26,59,140,0.7)}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:20px 24px}

/* FILTROS */
.filtros{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;margin-bottom:16px;align-items:end}
.filtro-grupo{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.filtro-label{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px}
.filtro-grupo select{width:100%;border:none;background:transparent;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);cursor:pointer;outline:none}
.btn-limpar{background:var(--gold);color:var(--blue);border:none;padding:10px 18px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;height:100%}
.btn-limpar:hover{background:var(--gold-dk)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;text-align:center}
.kpi-valor{font-size:28px;font-weight:700;color:var(--blue)}
.kpi-label{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}

/* GRID DE CONTEÚDO */
.grid{display:grid;grid-template-columns:280px 1fr;gap:16px;margin-bottom:16px}
.grid-right{display:flex;flex-direction:column;gap:16px}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-titulo{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--gold)}

/* GRÁFICO DE BARRAS */
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-mes{font-size:11px;color:var(--text2);width:70px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#F3E8A0;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;background:var(--blue);border-radius:4px;transition:width 0.4s;display:flex;align-items:center;padding-left:6px}
.bar-num{font-size:10px;font-weight:600;color:var(--white);white-space:nowrap}

/* TABELA RESUMO */
.resumo-table{width:100%;border-collapse:collapse}
.resumo-table th{background:var(--gold);color:var(--blue);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:7px 12px;text-align:left}
.resumo-table td{padding:6px 12px;font-size:12px;border-bottom:1px solid var(--gold-lt)}
.resumo-table tr:last-child td{font-weight:600;background:var(--gold-lt);color:var(--blue)}
.resumo-table tr:hover td{background:#FFFADF}

/* LISTA */
.lista-table{width:100%;border-collapse:collapse}
.lista-table th{background:var(--blue);color:var(--white);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;padding:8px 12px;text-align:left;position:sticky;top:0}
.lista-table th.sort{cursor:pointer}
.lista-table th.sort:hover{background:#2A4BA0}
.lista-table td{padding:7px 12px;font-size:12px;border-bottom:1px solid var(--gold-lt)}
.lista-table tr:hover td{background:#FFFADF}
.lista-wrap{max-height:340px;overflow-y:auto;border-radius:6px;border:1px solid var(--border)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--gold-lt);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="btn-portal">← Portal</a>
  <svg class="header-logo" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#1A3B8C" stroke-width="3"/>
    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Inter" font-weight="700" font-size="14" fill="#1A3B8C">BBTS</text>
  </svg>
  <h1>LEVANTAMENTO FÉRIAS</h1>
  <button class="btn-atualizar" id="btn" onclick="loadData()">↻ Atualizar</button>
  <div class="upd" id="upd">—</div>
</header>

<main class="main">
  <div class="filtros">
    <div class="filtro-grupo">
      <div class="filtro-label">Colaborador</div>
      <select id="f-colab" onchange="applyFilter()"><option value="">Todos</option></select>
    </div>
    <div class="filtro-grupo">
      <div class="filtro-label">Mês/Ano (Início)</div>
      <select id="f-mes" onchange="applyFilter()"><option value="">Todos</option></select>
    </div>
    <div class="filtro-grupo">
      <div class="filtro-label">Ano</div>
      <select id="f-ano" onchange="applyFilter()"><option value="">Todos</option></select>
    </div>
    <button class="btn-limpar" onclick="limparFiltros()">✕ Limpar</button>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="kpi-valor" id="k-total">—</div><div class="kpi-label">Total de Registros</div></div>
    <div class="kpi"><div class="kpi-valor" id="k-dias">—</div><div class="kpi-label">Total de Dias</div></div>
    <div class="kpi"><div class="kpi-valor" id="k-abono">—</div><div class="kpi-label">Dias de Abono</div></div>
    <div class="kpi"><div class="kpi-valor" id="k-colab">—</div><div class="kpi-label">Colaboradores</div></div>
  </div>

  <div class="grid">
    <!-- Gráfico de barras -->
    <div class="card">
      <div class="card-titulo">Visão Geral (por mês de início)</div>
      <div id="grafico"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
    </div>

    <div class="grid-right">
      <!-- Tabela resumo -->
      <div class="card">
        <div class="card-titulo">Total de Dias por Mês</div>
        <div style="max-height:200px;overflow-y:auto">
          <table class="resumo-table" id="t-resumo">
            <thead><tr><th>Mês/Ano</th><th>Total Dias no Mês</th></tr></thead>
            <tbody id="b-resumo"></tbody>
          </table>
        </div>
      </div>

      <!-- Lista -->
      <div class="card">
        <div class="card-titulo">Registros</div>
        <div class="lista-wrap">
          <table class="lista-table">
            <thead>
              <tr>
                <th class="sort" onclick="sortBy('nome')">Colaborador ↕</th>
                <th class="sort" onclick="sortBy('inicio')">Início ↕</th>
                <th class="sort" onclick="sortBy('fim')">Fim ↕</th>
                <th>Dias</th>
                <th>Abono</th>
              </tr>
            </thead>
            <tbody id="b-lista"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const API = '/api/notion';
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MESES_CURTOS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

let todos = [], filtrado = [];
let sortCol = 'inicio', sortDir = 1;

function fmtD(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function mesAno(d){if(!d)return null;var p=d.split('-');return MESES[parseInt(p[1])-1]+'-'+p[0];}
function mesAnoKey(d){if(!d)return'';var p=d.split('-');return p[0]+'-'+p[1];}

async function loadData(){
  document.getElementById('btn').textContent='↻ Carregando...';
  document.getElementById('b-lista').innerHTML='<tr><td colspan="5" class="loading"><div class="spinner"></div></td></tr>';

  try{
    var res = await fetch(API+'?db=afastamentos_ferias');
    var data = await res.json();
    if(data.error) throw new Error(data.error);

    todos = (data.ferias||[]).map(function(r){
      return {
        nome: r.nome||'—',
        inicio: r.data_inicio||null,
        fim: r.data_fim||null,
        dias: r.qtd_dias||0,
        abono: r.dias_abono||0,
      };
    });

    preencherFiltros();
    applyFilter();
    document.getElementById('upd').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('b-lista').innerHTML='<tr><td colspan="5" style="padding:20px;color:red">Erro: '+e.message+'</td></tr>';
  }
  document.getElementById('btn').textContent='↻ Atualizar';
}

function preencherFiltros(){
  var nomes = [...new Set(todos.map(r=>r.nome))].sort();
  var meses = [...new Set(todos.filter(r=>r.inicio).map(r=>mesAnoKey(r.inicio)))].sort();
  var anos  = [...new Set(todos.filter(r=>r.inicio).map(r=>r.inicio.split('-')[0]))].sort();

  var sc = document.getElementById('f-colab');
  sc.innerHTML='<option value="">Todos</option>';
  nomes.forEach(n=>sc.innerHTML+=`<option value="${n}">${n}</option>`);

  var sm = document.getElementById('f-mes');
  sm.innerHTML='<option value="">Todos</option>';
  meses.forEach(k=>{var p=k.split('-');sm.innerHTML+=`<option value="${k}">${MESES[parseInt(p[1])-1]}-${p[0]}</option>`;});

  var sa = document.getElementById('f-ano');
  sa.innerHTML='<option value="">Todos</option>';
  anos.forEach(a=>sa.innerHTML+=`<option value="${a}">${a}</option>`);
}

function applyFilter(){
  var fc = document.getElementById('f-colab').value;
  var fm = document.getElementById('f-mes').value;
  var fa = document.getElementById('f-ano').value;

  filtrado = todos.filter(function(r){
    if(fc && r.nome!==fc) return false;
    if(fm && mesAnoKey(r.inicio)!==fm) return false;
    if(fa && r.inicio && r.inicio.split('-')[0]!==fa) return false;
    return true;
  });

  render();
}

function limparFiltros(){
  document.getElementById('f-colab').value='';
  document.getElementById('f-mes').value='';
  document.getElementById('f-ano').value='';
  applyFilter();
}

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
  render();
}

function render(){
  // KPIs
  var totalDias = filtrado.reduce((s,r)=>s+(r.dias||0),0);
  var totalAbono = filtrado.reduce((s,r)=>s+(r.abono||0),0);
  var colab = new Set(filtrado.map(r=>r.nome)).size;
  document.getElementById('k-total').textContent=filtrado.length;
  document.getElementById('k-dias').textContent=totalDias;
  document.getElementById('k-abono').textContent=totalAbono;
  document.getElementById('k-colab').textContent=colab;

  // Agrupar por mês
  var porMes = {};
  filtrado.forEach(function(r){
    if(!r.inicio) return;
    var k = mesAnoKey(r.inicio);
    if(!porMes[k]) porMes[k]={count:0,dias:0};
    porMes[k].count++;
    porMes[k].dias+=r.dias||0;
  });
  var mesesOrdenados = Object.keys(porMes).sort();
  var maxCount = Math.max(...mesesOrdenados.map(k=>porMes[k].count),1);

  // Gráfico
  var gHtml = '';
  mesesOrdenados.forEach(function(k){
    var p=k.split('-');
    var label=MESES_CURTOS[parseInt(p[1])-1]+'/'+p[0].slice(2);
    var pct = (porMes[k].count/maxCount*100).toFixed(1);
    gHtml+=`<div class="bar-item">
      <div class="bar-mes">${label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%">
          <span class="bar-num">${porMes[k].count}</span>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('grafico').innerHTML=gHtml||'<div style="color:var(--text2);font-size:12px;text-align:center;padding:20px">Sem dados</div>';

  // Resumo por mês
  var rHtml='';
  var totalD=0;
  mesesOrdenados.forEach(function(k){
    var p=k.split('-');
    var label=MESES[parseInt(p[1])-1]+'-'+p[0];
    totalD+=porMes[k].dias;
    rHtml+=`<tr><td>${label}</td><td>${porMes[k].dias}</td></tr>`;
  });
  rHtml+=`<tr><td>Total</td><td>${totalD}</td></tr>`;
  document.getElementById('b-resumo').innerHTML=rHtml;

  // Lista ordenada
  var lista=[...filtrado].sort(function(a,b){
    var va=a[sortCol]||'';var vb=b[sortCol]||'';
    return va<vb?-sortDir:va>vb?sortDir:0;
  });

  var lHtml='';
  lista.forEach(function(r){
    lHtml+=`<tr>
      <td>${r.nome}</td>
      <td>${fmtD(r.inicio)}</td>
      <td>${fmtD(r.fim)}</td>
      <td>${r.dias||'—'}</td>
      <td>${r.abono||0}</td>
    </tr>`;
  });
  document.getElementById('b-lista').innerHTML=lHtml||'<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--text2)">Nenhum registro encontrado</td></tr>';
}

loadData();
</script>
</body>
</html>
