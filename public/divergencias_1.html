async function run() {
  var rVinculos = await fetch(API + '?db=vinculos').then(r => r.json());
  var rCargos = await fetch(API + '?db=cargos_lista').then(r => r.json());

  var cargoMap = {};
  (rCargos.cargos || []).forEach(c => { cargoMap[c.id] = c; });
  var codigoParaCargo = {};
  (rCargos.cargos || []).forEach(c => { codigoParaCargo[c.codigo] = c; });

  var vinculoPorMatricula = {};
  (rVinculos.vinculos || []).forEach(v => {
    if (v.status !== 'Ativo') return;
    if (!v.matricula) return;
    vinculoPorMatricula[String(v.matricula).trim()] = v;
  });

  var rows = [];
  ATIVOS_ESPERADOS.forEach(esperado => {
    var mat = esperado['Matrícula'];
    var nome = esperado['Nome'];
    var postoEsperado = esperado['Posto SGPS'];
    var vinculo = vinculoPorMatricula[mat];

    if (!vinculo) {
      rows.push({mat, nome, cargoNotion: '—', postoEsp: postoEsperado, tipo: 'nao-encontrado', label: 'Não encontrado'});
      return;
    }
    var cargoAtual = vinculo.cargo_id ? cargoMap[vinculo.cargo_id] : null;
    if (!cargoAtual) {
      var espInfo = codigoParaCargo[postoEsperado];
      var espTxt = postoEsperado + (espInfo ? ' — ' + espInfo.descricao : '');
      rows.push({mat, nome, cargoNotion: '—', postoEsp: espTxt, tipo: 'sem-cargo', label: 'Sem cargo'});
      return;
    }
    if (String(cargoAtual.codigo).trim() !== String(postoEsperado).trim()) {
      var espInfo2 = codigoParaCargo[postoEsperado];
      var espTxt2 = postoEsperado + (espInfo2 ? ' — ' + espInfo2.descricao : '');
      var notTxt = cargoAtual.codigo + ' — ' + (cargoAtual.descricao||'');
      rows.push({mat, nome, cargoNotion: notTxt, postoEsp: espTxt2, tipo: 'divergente', label: 'Divergente'});
    }
  });

  document.getElementById('resumo').textContent =
    rows.length + ' divergências encontradas de ' + ATIVOS_ESPERADOS.length + ' colaboradores na planilha ' +
    '(' + rows.filter(r=>r.tipo==='divergente').length + ' divergentes, ' +
    rows.filter(r=>r.tipo==='sem-cargo').length + ' sem cargo, ' +
    rows.filter(r=>r.tipo==='nao-encontrado').length + ' não encontrados)';

  document.getElementById('tbody').innerHTML = rows.map(r =>
    '<tr><td>'+r.mat+'</td><td>'+r.nome+'</td><td>'+r.cargoNotion+'</td><td>'+r.postoEsp+'</td><td class="'+r.tipo+'">'+r.label+'</td></tr>'
  ).join('');

  document.getElementById('loading').style.display = 'none';
  document.getElementById('tbl').style.display = 'table';
}
run().catch(e => { document.getElementById('loading').textContent = 'Erro: ' + e.message; });
</script>
