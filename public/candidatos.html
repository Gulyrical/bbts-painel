<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBTS — Cadastro de Candidatos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#465EFF;--green:#2E7D5E;--green-lt:#E6F4EF;--red:#C0392B;--red-lt:#FDECEA;--bg:#F5F6F8;--white:#fff;--border:#E5E7EB;--text:#111827;--text2:#6B7280;--radius:8px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.senha-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.senha-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px;width:340px;text-align:center}
.senha-logo{font-size:32px;margin-bottom:12px}
.senha-titulo{font-size:18px;font-weight:600;margin-bottom:4px}
.senha-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.senha-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:'Inter',sans-serif;text-align:center;letter-spacing:0.1em;margin-bottom:12px}
.senha-input:focus{outline:none;border-color:var(--blue)}
.senha-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.senha-btn:hover{background:#3548e0}
.senha-erro{color:var(--red);font-size:12px;margin-top:8px;display:none}
.header{background:var(--blue);color:#fff;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand-mark{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:14px;font-weight:600}
.brand-sub{font-size:11px;opacity:0.65;margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.btn-acao{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn-acao:hover{background:rgba(255,255,255,0.25)}
.main{max-width:800px;margin:0 auto;padding:24px 28px}
.form-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.form-titulo{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.form-input,.form-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Inter',sans-serif;background:var(--white);color:var(--text)}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--blue)}

/* Upload area */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;background:#FAFAFA}
.upload-area:hover,.upload-area.drag{border-color:var(--blue);background:#EEF0FF}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--text2)}
.upload-text strong{color:var(--blue)}
.upload-file-info{display:none;align-items:center;gap:10px;padding:10px 14px;background:var(--green-lt);border:1px solid #A7D4C0;border-radius:var(--radius);margin-top:10px}
.upload-file-info.visible{display:flex}
.upload-file-nome{font-size:13px;font-weight:500;color:var(--green);flex:1}
.upload-file-remover{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:2px}

/* Progress */
.progress-wrap{display:none;margin-top:12px}
.progress-wrap.visible{display:block}
.progress-bar-bg{background:#EEF0FF;border-radius:4px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:var(--blue);border-radius:4px;transition:width 0.3s;width:0%}
.progress-text{font-size:11px;color:var(--text2);margin-top:4px;text-align:center}

/* SPS selecionadas */
.sps-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:32px}
.sps-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:#EEF0FF;border:1px solid var(--blue);border-radius:20px;font-size:12px;font-weight:500;color:var(--blue)}
.sps-chip button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px;line-height:1;padding:0}

.btn-primary{padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.btn-primary:hover{background:#3548e0}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{padding:10px 20px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}

.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;transform:translateY(100px);opacity:0;transition:all 0.3s}
.toast.visible{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-icon{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>

<div class="senha-screen" id="tela-senha">
  <div class="senha-box">
    <div class="senha-logo">👤</div>
    <div class="senha-titulo">Cadastro de Candidatos</div>
    <div class="senha-sub">Digite a senha para acessar</div>
    <input type="password" class="senha-input" id="campo-senha" placeholder="••••••••">
    <button class="senha-btn" id="btn-entrar">Entrar</button>
    <div class="senha-erro" id="msg-erro">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<header class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="brand-mark">👤</div>
    <div>
      <div class="brand-name">BBTS — Candidatos</div>
      <div class="brand-sub">Cadastrar candidato e vincular à SPS</div>
    </div>
  </div>
  <div class="header-right">
    <a href="/gestao-sps.html" class="btn-acao">📋 Gestão SPS</a>
    <a href="/" class="btn-acao">← Portal</a>
  </div>
</header>

<main class="main">
  <div class="form-section">
    <div class="form-titulo">Dados do Candidato</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nome Completo *</label>
        <input type="text" class="form-input" id="c-nome" placeholder="Nome do candidato">
      </div>
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input type="tel" class="form-input" id="c-telefone" placeholder="(61) 99999-9999">
      </div>
      <div class="form-group full">
        <label class="form-label">Cargo Pretendido</label>
        <select class="form-select" id="c-cargo">
          <option value="">Carregando cargos...</option>
        </select>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-titulo">Currículo (PDF)</div>
    <div class="upload-area" id="upload-area">
      <div class="upload-icon">📄</div>
      <div class="upload-text">
        <strong>Clique para selecionar</strong> ou arraste o PDF aqui<br>
        <span style="font-size:11px">Máximo 10MB</span>
      </div>
      <input type="file" id="arquivo-input" accept=".pdf,application/pdf" style="display:none">
    </div>
    <div class="upload-file-info" id="file-info">
      <span class="upload-file-nome" id="file-nome">—</span>
      <button class="upload-file-remover" id="btn-remover-arquivo">✕</button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-text" id="progress-text">Enviando...</div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-titulo">Vincular à SPS</div>
    <div class="form-group">
      <label class="form-label">Selecionar SPS (pode escolher mais de uma)</label>
      <select class="form-select" id="c-sps-select" onchange="adicionarSPS()">
        <option value="">Carregando SPS abertas...</option>
      </select>
    </div>
    <div class="sps-chips" id="sps-chips"></div>
  </div>

  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn-secondary" id="btn-limpar">Limpar</button>
    <button class="btn-primary" id="btn-salvar">Cadastrar Candidato</button>
  </div>
</main>

<div class="toast" id="toast-msg"></div>

<script>
var SENHA_CORRETA = 'digisystem';
var API = '/api/notion';
var arquivoSelecionado = null;
var spsSelecionadas = {}; // {id: {id, numero, gerente}}
var cargosMap = {}; // {id: {codigo, descricao}}

// Senha
document.getElementById('btn-entrar').addEventListener('click', function() {
  var v = document.getElementById('campo-senha').value;
  if (v === SENHA_CORRETA) {
    document.getElementById('tela-senha').style.display = 'none';
    carregarDados();
  } else {
    document.getElementById('msg-erro').style.display = 'block';
    document.getElementById('campo-senha').value = '';
    document.getElementById('campo-senha').focus();
  }
});
document.getElementById('campo-senha').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('btn-entrar').click();
});

// Toast
function toast(msg, tipo) {
  var t = document.getElementById('toast-msg');
  t.textContent = msg;
  t.className = 'toast visible ' + (tipo || '');
  setTimeout(function() { t.className = 'toast'; }, 3500);
}

// Carregar cargos e SPS
async function carregarDados() {
  try {
    var [resCargos, resSPS] = await Promise.all([
      fetch(API + '?db=cargos_lista'),
      fetch(API + '?db=sps_abertas')
    ]);
    var dCargos = await resCargos.json();
    var dSPS = await resSPS.json();

    // Preencher cargos
    var selectCargo = document.getElementById('c-cargo');
    selectCargo.innerHTML = '<option value="">Selecione o cargo...</option>';
    (dCargos.cargos || []).forEach(function(c) {
      cargosMap[c.id] = c;
      selectCargo.innerHTML += '<option value="' + c.id + '">' + c.codigo + (c.descricao ? ' — ' + c.descricao : '') + '</option>';
    });

    // Preencher SPS
    var selectSPS = document.getElementById('c-sps-select');
    selectSPS.innerHTML = '<option value="">Selecione uma SPS para vincular...</option>';
    (dSPS.sps_abertas || []).forEach(function(s) {
      selectSPS.innerHTML += '<option value="' + s.id + '" data-numero="' + (s.numero_sps||'') + '" data-gerente="' + (s.gerente||'') + '">' +
        s.numero_sps + (s.gerente ? ' — ' + s.gerente : '') + ' [' + s.status + ']</option>';
    });
  } catch(e) {
    toast('Erro ao carregar dados: ' + e.message, 'error');
  }
}

// Upload de arquivo
var uploadArea = document.getElementById('upload-area');
var fileInput = document.getElementById('arquivo-input');

uploadArea.addEventListener('click', function() { fileInput.click(); });
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('drag'); });
uploadArea.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadArea.classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if (f) selecionarArquivo(f);
});
fileInput.addEventListener('change', function() {
  if (this.files[0]) selecionarArquivo(this.files[0]);
});

function selecionarArquivo(f) {
  if (f.size > 10 * 1024 * 1024) { toast('Arquivo muito grande! Máximo 10MB.', 'error'); return; }
  if (!f.type.includes('pdf') && !f.name.toLowerCase().endsWith('.pdf')) { toast('Apenas arquivos PDF!', 'error'); return; }
  arquivoSelecionado = f;
  document.getElementById('file-nome').textContent = f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
  document.getElementById('file-info').classList.add('visible');
}

document.getElementById('btn-remover-arquivo').addEventListener('click', function() {
  arquivoSelecionado = null;
  fileInput.value = '';
  document.getElementById('file-info').classList.remove('visible');
});

// Adicionar SPS
function adicionarSPS() {
  var sel = document.getElementById('c-sps-select');
  var id = sel.value;
  if (!id || spsSelecionadas[id]) { sel.value = ''; return; }
  var opt = sel.options[sel.selectedIndex];
  spsSelecionadas[id] = { id: id, numero: opt.getAttribute('data-numero'), gerente: opt.getAttribute('data-gerente') };
  sel.value = '';
  renderChips();
}

function removerSPS(id) {
  delete spsSelecionadas[id];
  renderChips();
}

function renderChips() {
  var chips = document.getElementById('sps-chips');
  chips.innerHTML = Object.values(spsSelecionadas).map(function(s) {
    return '<div class="sps-chip">' + s.numero + (s.gerente ? ' — ' + s.gerente : '') +
      '<button onclick="removerSPS(\'' + s.id + '\')">✕</button></div>';
  }).join('');
}

// Limpar
document.getElementById('btn-limpar').addEventListener('click', function() {
  document.getElementById('c-nome').value = '';
  document.getElementById('c-telefone').value = '';
  document.getElementById('c-cargo').value = '';
  arquivoSelecionado = null;
  fileInput.value = '';
  document.getElementById('file-info').classList.remove('visible');
  spsSelecionadas = {};
  renderChips();
});

// Salvar
document.getElementById('btn-salvar').addEventListener('click', async function() {
  var nome = document.getElementById('c-nome').value.trim();
  if (!nome) { toast('Preencha o nome do candidato!', 'error'); return; }

  var btn = this;
  btn.disabled = true;

  try {
    var curriculoUrl = null;

    // 1. Upload do currículo se tiver
    if (arquivoSelecionado) {
      btn.innerHTML = '<span class="spin-icon"></span>Enviando currículo...';
      document.getElementById('progress-wrap').classList.add('visible');
      document.getElementById('progress-bar').style.width = '30%';
      document.getElementById('progress-text').textContent = 'Enviando para o Google Drive...';

      // Converter para base64
      var base64 = await new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() { resolve(reader.result.split(',')[1]); };
        reader.onerror = reject;
        reader.readAsDataURL(arquivoSelecionado);
      });

      document.getElementById('progress-bar').style.width = '60%';

      var uploadRes = await fetch(API, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          action: 'upload_curriculo',
          dados: {
            file_base64: base64,
            file_name: nome.replace(/\s+/g, '_') + '_curriculo.pdf',
            mime_type: 'application/pdf'
          }
        })
      });
      var uploadData = await uploadRes.json();
      if (uploadData.error) throw new Error('Upload: ' + uploadData.error);
      curriculoUrl = uploadData.url;

      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-text').textContent = 'Currículo enviado!';
    }

    // 2. Criar candidato no Notion
    btn.innerHTML = '<span class="spin-icon"></span>Cadastrando...';
    var candidatoRes = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'criar_candidato',
        dados: {
          nome: nome,
          telefone: document.getElementById('c-telefone').value.trim(),
          cargo_id: document.getElementById('c-cargo').value || null,
          curriculo_url: curriculoUrl,
          sps_ids: Object.keys(spsSelecionadas),
        }
      })
    });
    var candidatoData = await candidatoRes.json();
    if (candidatoData.error) throw new Error(candidatoData.error);

    toast('✅ Candidato ' + nome + ' cadastrado com sucesso!', 'success');
    document.getElementById('btn-limpar').click();
    document.getElementById('progress-wrap').classList.remove('visible');

  } catch(e) {
    toast('Erro: ' + e.message, 'error');
    document.getElementById('progress-wrap').classList.remove('visible');
  }

  btn.disabled = false;
  btn.innerHTML = 'Cadastrar Candidato';
});
</script>
</body>
</html>
